# NotificationScheduler-v0 — Hyperparameters
# All tuneable constants for the environment are defined here.

episode:
  length: 60              # Total timesteps per episode
  time_of_day_period: 20  # Steps per time-of-day bin (morning/afternoon/evening)

queue:
  max_size: 8             # Maximum notifications in queue
  overflow_penalty: -2.0  # Reward penalty when a notification cannot be added

notifications:
  arrival_prob: 0.3       # Per-step probability a new notification arrives
  # Reward value formula: base + urgency * urgency_scale + importance * importance_scale
  value_base: 1.0
  value_urgency_scale: 1.5
  value_importance_scale: 1.0
  # Decay rate formula: base + urgency * urgency_scale  (per step)
  decay_base: 0.05
  decay_urgency_scale: 0.05

actions:
  empty_deliver_penalty: -0.5  # Penalty for delivering when queue is empty

rewards:
  productivity_bonus_per_concentration: 0.1  # Per step, per concentration level

concentration:
  # Ceiling per context (0=idle, 1=focus, 2=meeting)
  ceilings:
    idle: 1
    focus: 2
    meeting: 0
  drift_prob: 0.3          # Per-step probability concentration drifts toward ceiling
  # After delivery: drop by 1, then with drop2_prob drop by 1 more
  drop2_prob: 0.5

interruption:
  cost_per_level: 1.5      # Base cost multiplied by (concentration+1) * context_multiplier
  # Context multipliers (0=idle, 1=focus, 2=meeting)
  context_multipliers:
    idle: 0.5
    focus: 1.5
    meeting: 0.8

context:
  transition_prob: 0.1     # Per-step probability of context switching
